<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 信息阅览 | 每日新闻</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
<style>
/* ============================================================
   全局样式
   ============================================================ */
:root {
  /* =====「数据温度」- 暖色暗调主题 ===== */
  --bg-deep: #0f1118;
  --bg-primary: #141726;
  --bg-surface: #1a1d2b;
  --bg-hover: #222638;
  --bg-elevated: #262b40;
  --text-primary: #e8e6e3;
  --text-secondary: #9593a6;
  --text-tertiary: #636178;
  --border-subtle: rgba(255,255,255,0.06);
  --border-default: rgba(255,255,255,0.1);
  --border-accent: rgba(232,99,74,0.25);

  --accent-coral: #e8634a;
  --accent-coral-soft: rgba(232,99,74,0.12);
  --accent-coral-glow: rgba(232,99,74,0.15);
  --accent-blue: #4a90d9;
  --accent-blue-soft: rgba(74,144,217,0.12);
  --accent-gold: #d4a853;
  --accent-gold-soft: rgba(212,168,83,0.12);
  --accent-green: #34d399;
  --accent-green-soft: rgba(52,211,153,0.12);
  --accent-red: #ef4444;
  --accent-rose: #fb7185;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.25);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.35);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.2);

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;

  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --card-transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== 日间模式（暖白纸本） ===== */
[data-theme="light"] {
  --bg-deep: #f0ede8;
  --bg-primary: #f5f3ef;
  --bg-surface: #ffffff;
  --bg-hover: #f0ede8;
  --bg-elevated: #ffffff;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-tertiary: #999999;
  --border-subtle: rgba(0,0,0,0.06);
  --border-default: rgba(0,0,0,0.1);
  --border-accent: rgba(232,99,74,0.2);

  --accent-coral: #d4503a;
  --accent-coral-soft: rgba(212,80,58,0.08);
  --accent-coral-glow: rgba(212,80,58,0.1);
  --accent-blue: #3b82f6;
  --accent-blue-soft: rgba(59,130,246,0.08);
  --accent-gold: #b8860b;
  --accent-gold-soft: rgba(184,134,11,0.08);
  --accent-green: #059669;
  --accent-green-soft: rgba(5,150,105,0.08);

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 28px rgba(0,0,0,0.08);
  --shadow-card: 0 1px 4px rgba(0,0,0,0.04);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  transition: background 0.4s ease, color 0.3s ease;
}
a { color: var(--accent-coral); text-decoration: none; transition: var(--transition); }
a:hover { color: var(--accent-coral); opacity: 0.85; }

/* ============================================================
   头部
   ============================================================ */
.header {
  background: var(--bg-primary);
  color: var(--text-primary); padding: 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 24px rgba(0,0,0,0.3);
  border-bottom: 1px solid var(--border-subtle);
  transition: background 0.4s ease;
}
.header-inner { max-width: 1200px; margin: 0 auto; padding: 14px 24px 10px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo { font-size: 22px; line-height: 1; }
.header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-title span { color: var(--accent-coral); }
.header-info { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
.header-info .status-indicator { display: flex; align-items: center; gap: 4px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.status-dot.success { background: var(--accent-green); }
.status-dot.fetching { background: var(--accent-gold); animation: pulse 1.5s infinite; }
.status-dot.error { background: var(--accent-red); }
.status-dot.pending { background: var(--text-tertiary); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.refresh-btn {
  background: var(--bg-surface); border: 1px solid var(--border-default);
  color: var(--text-primary); padding: 5px 12px; border-radius: 6px; font-size: 12px;
  cursor: pointer; transition: var(--transition); font-family: var(--font-sans);
  display: flex; align-items: center; gap: 4px;
}
.refresh-btn:hover { background: var(--bg-hover); border-color: var(--accent-coral); color: var(--accent-coral); }
.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.refresh-btn.spinning .icon { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 日间/夜间切换按钮 */
.theme-toggle {
  background: var(--bg-surface); border: 1px solid var(--border-default);
  color: var(--text-secondary); width: 30px; height: 30px; border-radius: 6px;
  cursor: pointer; transition: var(--transition); font-size: 15px;
  display: flex; align-items: center; justify-content: center; line-height: 1;
}
.theme-toggle:hover { background: var(--bg-hover); border-color: var(--accent-coral); }

/* ============================================================
   导航 - 下拉菜单
   ============================================================ */
.nav-bar {
  display: flex; gap: 3px; align-items: stretch;
  background: var(--bg-surface); border-radius: var(--radius-md); padding: 3px;
  flex-wrap: wrap;
  border: 1px solid var(--border-subtle);
  overflow: visible;
}
.nav-group { position: relative; }
.nav-group-btn {
  padding: 7px 12px; background: transparent; border: none;
  color: var(--text-secondary); font-size: 13px; font-weight: 500;
  border-radius: 6px; cursor: pointer; transition: var(--transition);
  font-family: var(--font-sans); white-space: nowrap;
  display: flex; align-items: center; gap: 4px; height: 100%;
}
.nav-group-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.nav-group-btn.active { background: var(--bg-elevated); color: var(--text-primary); font-weight: 600; }
.nav-group-btn .arrow { font-size: 10px; transition: transform 0.2s; }
.nav-group-btn.open .arrow { transform: rotate(180deg); }

.nav-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg); min-width: 170px;
  overflow: hidden; display: none; z-index: 999;
  padding: 4px;
}
.nav-dropdown.show { display: block; }
.dropdown-item {
  padding: 10px 16px; color: var(--text-primary); font-size: 13px;
  cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; gap: 8px; border: none; background: none;
  width: 100%; text-align: left; font-family: var(--font-sans);
  border-radius: 6px;
}
.dropdown-item:hover { background: rgba(59,130,246,0.1); color: var(--accent-blue); }
.dropdown-item.active { background: rgba(59,130,246,0.12); color: var(--accent-blue); font-weight: 600; }
[data-theme="dark"] .dropdown-item:hover { background: rgba(96,165,250,0.1); }
[data-theme="dark"] .dropdown-item.active { background: rgba(96,165,250,0.15); }
.dropdown-item .count {
  margin-left: auto; background: rgba(0,0,0,0.06); border-radius: 10px;
  padding: 0 8px; font-size: 11px; color: var(--text-tertiary);
  font-weight: 400;
}
[data-theme="dark"] .dropdown-item .count { background: rgba(255,255,255,0.08); }

/* 功能按钮 */
.nav-actions { display: flex; gap: 3px; margin-left: auto; }
.nav-action-btn {
  padding: 7px 10px; background: transparent; border: none;
  color: var(--text-secondary); font-size: 12px; font-weight: 500;
  border-radius: 6px; cursor: pointer; transition: var(--transition);
  font-family: var(--font-sans); white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.nav-action-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.nav-action-btn.active { background: var(--bg-elevated); color: var(--text-primary); font-weight: 600; }

/* ============================================================
   搜索栏
   ============================================================ */
.search-bar {
  display: flex; gap: 8px; align-items: center;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md); padding: 6px 12px; margin-bottom: 8px;
}
.search-input {
  flex: 1; background: transparent; border: none; color: var(--text-primary); font-size: 13px;
  font-family: var(--font-sans); outline: none; min-width: 0;
}
.search-input::placeholder { color: var(--text-tertiary); }
.search-date {
  background: var(--bg-elevated); border: 1px solid var(--border-default);
  color: var(--text-primary); border-radius: 4px; padding: 4px 8px; font-size: 12px;
  font-family: var(--font-sans); outline: none;
}
.search-date::-webkit-calendar-picker-indicator { filter: invert(0.7); }
.search-btn {
  background: var(--accent-coral); color: white; border: none;
  padding: 5px 14px; border-radius: 4px; font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: var(--font-sans); transition: var(--transition);
}
.search-btn:hover { background: var(--accent-coral); opacity: 0.9; }

/* ============================================================
   主内容
   ============================================================ */
.main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

/* ============================================================
   骨架屏（加载占位）
   ============================================================ */
.skeleton { background: linear-gradient(90deg, rgba(150,150,180,0.06) 25%, rgba(150,150,180,0.12) 50%, rgba(150,150,180,0.06) 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px; }
[data-theme="light"] .skeleton { background: linear-gradient(90deg, rgba(0,0,0,0.04) 25%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 75%); background-size: 200% 100%; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.skeleton-card {
  background: var(--bg-surface);
  border-radius: var(--radius-md); padding: 20px 22px;
  border: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; gap: 12px;
}
.skeleton-card .skeleton-line { height: 14px; width: 100%; }
.skeleton-card .skeleton-line.short { width: 40%; }
.skeleton-card .skeleton-line.medium { width: 65%; }
.skeleton-card .skeleton-line.title { height: 18px; width: 85%; }
.skeleton-card .skeleton-line.meta { height: 22px; width: 120px; border-radius: 20px; }

/* ============================================================
   欢迎 / 空状态
   ============================================================ */
.welcome-screen {
  text-align: center; padding: 80px 24px;
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-subtle);
}
.welcome-screen .icon { font-size: 64px; margin-bottom: 24px; }
.welcome-screen h2 { font-size: 24px; margin-bottom: 12px; }
.welcome-screen p { color: var(--text-secondary); font-size: 15px; max-width: 480px; margin: 0 auto 24px; line-height: 1.7; }
.welcome-screen .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.welcome-screen .actions button {
  padding: 12px 28px; border-radius: var(--radius-sm); border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: var(--font-sans);
}
.welcome-screen .btn-primary { background: var(--accent-blue); color: white; }
.welcome-screen .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
.welcome-screen .btn-secondary { background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); }
.welcome-screen .btn-secondary:hover { background: var(--border-color); }

/* 加载 / 错误 状态 */
.loading-screen { text-align: center; padding: 40px 24px; }
.loading-spinner {
  width: 36px; height: 36px; border: 3px solid var(--border-default);
  border-top-color: var(--accent-coral); border-radius: 50%;
  margin: 0 auto 16px; animation: spin 0.7s linear infinite;
}
.loading-screen p { color: var(--text-secondary); font-size: 14px; }

.error-screen {
  text-align: center; padding: 60px 24px;
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-subtle);
}
.error-screen .icon { font-size: 48px; margin-bottom: 16px; }
.error-screen h2 { font-size: 20px; margin-bottom: 8px; color: var(--accent-red); }
.error-screen p { color: var(--text-secondary); margin-bottom: 20px; }
.error-screen button {
  padding: 10px 24px; background: var(--accent-blue); color: white;
  border: none; border-radius: var(--radius-sm); font-size: 14px;
  cursor: pointer; font-family: var(--font-sans); font-weight: 500;
}

/* ============================================================
   板块标题
   ============================================================ */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.section-header h2 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: var(--text-primary); }
.section-header .count-badge {
  background: var(--bg-elevated); color: var(--text-secondary);
  font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 4px;
}
.section-header .last-update { font-size: 11px; color: var(--text-tertiary); }
.update-banner {
  background: var(--accent-green-soft);
  border: 1px solid rgba(52,211,153,0.15);
  border-radius: var(--radius-sm);
  padding: 8px 14px; margin-bottom: 16px; font-size: 13px; color: var(--accent-green);
  display: flex; align-items: center; gap: 8px;
}
.update-banner.error { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.15); color: var(--accent-red); }

/* ============================================================
   新闻卡片
   ============================================================ */
.news-grid { display: flex; flex-direction: column; gap: 12px; }
.news-card {
  background: var(--bg-surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  transition: var(--card-transition);
  border: 1px solid var(--border-subtle);
  position: relative;
  overflow: hidden; display: flex; flex-direction: column;
  animation: cardFadeIn 0.4s ease both;
}
.news-card:nth-child(1) { animation-delay: 0.02s; }
.news-card:nth-child(2) { animation-delay: 0.05s; }
.news-card:nth-child(3) { animation-delay: 0.08s; }
.news-card:nth-child(4) { animation-delay: 0.11s; }
.news-card:nth-child(5) { animation-delay: 0.14s; }
.news-card:nth-child(6) { animation-delay: 0.17s; }
.news-card:nth-child(7) { animation-delay: 0.20s; }
.news-card:nth-child(8) { animation-delay: 0.23s; }
.news-card:nth-child(9) { animation-delay: 0.26s; }
.news-card:nth-child(10) { animation-delay: 0.29s; }
.news-card:hover {
  box-shadow: var(--shadow-lg); transform: translateY(-2px);
  border-color: var(--border-default);
  background: var(--bg-hover);
}

@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 卡片左侧信号条 — 「数据温度」标志性元素 */
.news-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 3px 0 0 3px;
  transition: width 0.25s ease, opacity 0.25s ease;
  opacity: 0.7;
}
.news-card:hover::before { width: 4px; opacity: 1; }
.news-card[data-section*="international"]::before,
.news-card[data-section*="aiGlobal"]::before,
.news-card[data-section*="intl"]::before { background: var(--accent-blue); box-shadow: 0 0 8px rgba(74,144,217,0.3); }
.news-card[data-section*="china"]::before { background: var(--accent-rose); box-shadow: 0 0 8px rgba(251,113,133,0.3); }
.news-card[data-section*="running"]::before,
.news-card[data-section*="health"]::before { background: var(--accent-green); box-shadow: 0 0 8px rgba(52,211,153,0.3); }

/* 卡片图片（已禁用） */
.card-image-wrap { display: none; }

/* 卡片内容区 */
.card-body { padding: 14px 18px 14px 20px; flex: 1; }

.news-card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }

.source-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  letter-spacing: 0.2px;
}
.source-badge.high { background: var(--accent-green-soft); color: var(--accent-green); }
.source-badge.medium { background: var(--accent-gold-soft); color: var(--accent-gold); }
.source-badge.low { background: rgba(239,68,68,0.1); color: var(--accent-red); }

.type-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
}
.type-badge.fact { background: var(--accent-green-soft); color: var(--accent-green); }
.type-badge.speculation { background: var(--accent-gold-soft); color: var(--accent-gold); }
.type-badge.uncertain { background: var(--bg-elevated); color: var(--text-tertiary); }

.news-date { font-size: 11px; color: var(--text-tertiary); margin-left: auto; white-space: nowrap; }
.news-card-title {
  font-size: 15px; font-weight: 700; line-height: 1.5; margin-bottom: 4px;
  color: var(--text-primary); cursor: pointer; transition: color 0.2s;
  letter-spacing: -0.01em;
}
.news-card-title:hover { color: var(--accent-coral); }
.news-card-summary {
  font-size: 13px; color: var(--text-secondary); line-height: 1.7;
  margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden; line-clamp: 2;
}

.news-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 6px; padding-top: 8px;
  border-top: 1px solid var(--border-subtle);
}
.source-link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--text-secondary); font-weight: 500;
  transition: var(--transition);
}
.source-link:hover { color: var(--accent-coral); }

.news-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.news-tag {
  font-size: 11px; color: var(--text-tertiary);
  background: var(--bg-elevated); padding: 1px 6px; border-radius: 3px;
}

/* 收藏按钮 */
.fav-btn {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border-subtle);
  background: transparent; color: var(--text-tertiary);
  font-family: var(--font-sans); transition: var(--transition); white-space: nowrap;
}
.fav-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); background: var(--accent-gold-soft); }
.fav-btn.favorited { background: var(--accent-gold-soft); color: var(--accent-gold); border-color: var(--accent-gold); }

/* 今日新消息标记 */
.today-marker {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 0; margin: 4px 0 2px;
  color: var(--accent-green); font-size: 12px; font-weight: 600;
}
.today-marker::before, .today-marker::after {
  content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
}
.today-marker .badge {
  background: var(--accent-green-soft); color: var(--accent-green); padding: 2px 10px;
  border-radius: 4px; font-size: 10px; white-space: nowrap; border: 1px solid rgba(52,211,153,0.15);
}

/* ============================================================
   翻译按钮
   ============================================================ */
.translate-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border-subtle);
  background: transparent; color: var(--accent-blue);
  font-family: var(--font-sans); transition: var(--transition); white-space: nowrap;
}
.translate-btn:hover { background: var(--accent-blue-soft); border-color: var(--accent-blue); }
.translate-btn.translated { background: var(--accent-blue-soft); color: var(--accent-blue); border-color: var(--accent-blue); }
.translate-btn.loading { opacity: 0.6; cursor: wait; }

/* 全部翻译按钮 */
.translate-all-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border-subtle);
  background: transparent; color: var(--text-secondary);
  font-family: var(--font-sans); transition: var(--transition); white-space: nowrap;
}
.translate-all-btn:hover { background: var(--accent-blue-soft); border-color: var(--accent-blue); color: var(--accent-blue); }
.translate-all-btn.active { background: var(--accent-blue-soft); color: var(--accent-blue); border-color: var(--accent-blue); }
.translate-all-btn.translating { opacity: 0.6; cursor: wait; }

/* ============================================================
   空板块状态
   ============================================================ */
.empty-section {
  text-align: center; padding: 48px 24px; color: var(--text-tertiary);
  background: var(--bg-surface); border-radius: var(--radius-md);
  border: 1px solid var(--border-subtle);
}
.empty-section .icon { font-size: 36px; margin-bottom: 12px; }
.empty-section p { font-size: 14px; }

/* ============================================================
   分页
   ============================================================ */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 20px 0 8px; flex-wrap: wrap;
}
.pagination button {
  padding: 6px 14px; border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  font-size: 13px; cursor: pointer; transition: var(--transition);
  font-family: var(--font-sans); color: var(--text-primary);
}
.pagination button:hover:not(:disabled) { background: var(--accent-coral); color: white; border-color: var(--accent-coral); }
.pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
.pagination .page-info {
  font-size: 13px; color: var(--text-secondary); padding: 0 6px;
  display: flex; align-items: center; gap: 6px;
}
.pagination .page-info input {
  width: 46px; padding: 4px 6px; border: 1px solid var(--border-subtle);
  border-radius: 4px; text-align: center; font-size: 13px;

  color: var(--text-primary);
}
.pagination .page-info input:focus { border-color: var(--accent-coral); box-shadow: 0 0 0 2px var(--accent-coral-glow); }
.pagination .goto-btn {
  padding: 4px 10px; background: var(--accent-coral); color: white;
  border: none; border-radius: 4px; font-size: 12px; cursor: pointer;
  font-family: var(--font-sans);
}

/* ============================================================
   收藏&历史列表页
   ============================================================ */
.list-page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  background: var(--bg-surface);
  padding: 12px 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-subtle);
}
.list-page-header h2 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.list-page-header .list-actions { display: flex; gap: 8px; }
.list-page-header .list-actions button {
  padding: 5px 12px; border: 1px solid var(--border-subtle);
  background: transparent; border-radius: var(--radius-sm);
  font-size: 12px; cursor: pointer; transition: var(--transition);
  font-family: var(--font-sans); color: var(--text-secondary);
}
.list-page-header .list-actions button:hover { background: rgba(239,68,68,0.1); color: var(--accent-red); border-color: var(--accent-red); }

/* ============================================================
   响应式
   ============================================================ */
@media (max-width: 768px) {
  .header-inner { padding: 10px 14px 8px; }
  .header-top { flex-direction: column; align-items: flex-start; gap: 6px; }

<!-- ============================================================
     JavaScript

<script>
// ============================================================
// 状态管理
// ============================================================
let newsData = null;
let currentGroup = 'currentAffairs';
let currentSection = 'international';
let isRefreshing = false;
let autoRefreshTimer = null;

// 分组配置
const GROUPS = {
  currentAffairs: { title: '时事新闻', icon: '📰', subs: ['international','china'], defaultSub: 'international' },
  aiUpdates: { title: 'AI动态', icon: '🤖', subs: ['aiGlobal','aiChina'], defaultSub: 'aiGlobal' },
  health: { title: '运动健康', icon: '💪', subs: ['health'], defaultSub: 'health' }
};
const SUB_NAMES = {
  international: '国际新闻', china: '中国新闻',
  aiGlobal: 'AI 全球动态', aiChina: 'AI 中国动态',
  health: '运动健康'
};
const SUB_ICONS = {
  international: '🌍', china: '🇨🇳',
  aiGlobal: '🤖', aiChina: '🇨🇳',
  health: '💪'
};

let activeView = 'news'; // news | favorites | history | search

// 分页状态
const PAGE_SIZE = 10;
let newsPage = 1;
let favPage = 1;
let histPage = 1;
let searchPage = 1;

// Translation
const translationCache = new Map();
const TRANSLATION_CACHE_MAX = 500; // 限制翻译缓存条目数，避免内存无限增长
function setTranslationCache(key, value) {
  if (translationCache.size >= TRANSLATION_CACHE_MAX) {
    // 删除最早添加的条目（Map 迭代顺序 = 插入顺序）
    const firstKey = translationCache.keys().next().value;
    if (firstKey !== undefined) translationCache.delete(firstKey);
  }
  translationCache.set(key, value);
}
const translatedArticles = new Set();
const translationInProgress = new Set();
let isGlobalTranslate = false;
let translateAbortRequested = false;

// Favorites cache
let favoritesCache = null;
let favSet = new Set();

// ============================================================
// 核心函数
// ============================================================

async function loadNews() {
  showView('loading');
  try {
    const res = await fetch('/api/news');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data || data.status === 'empty' || !data.sections || Object.keys(data.sections).length === 0) {
      showView('welcome'); updateStatusBar(null); return;
    }
    newsData = data;
    // 自动拉取实时热搜
    try {
      const hotRes = await fetch('/api/hot');
      if (hotRes.ok) {
        const hot = await hotRes.json();
        if (Array.isArray(hot) && hot.length && newsData.sections.china) {
          const china = newsData.sections.china;
          const titles = new Set((china.items||[]).map(i=>i.title?.substring(0,30)));
          const fresh = hot.filter(i => !titles.has(i.title?.substring(0,30)));
          if (fresh.length) china.items = [...fresh, ...(china.items||[])];
        }
      }
    } catch (e) {}

    updateHeaderInfo(data);
    await loadFavSet();
    showNewsView();
    showView('content');
  } catch (err) {
    console.error('加载新闻失败:', err);
    document.getElementById('errorMessage').textContent = '无法连接到服务器，请确认服务已启动（npm start）。\n' + err.message;
    showView('error');
  }
}

/** 只加载当前可见卡片的收藏状态（代替加载全量 20000 条） */
async function loadFavStatusForVisibleCards() {
  const visibleIds = [];
  document.querySelectorAll('.news-card').forEach(card => {
    const id = card.dataset.id;
    if (id) visibleIds.push(id);
  });
  if (visibleIds.length === 0) return;
  try {
    const res = await fetch('/api/favorites/batch-check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: visibleIds })
    });
    if (res.ok) {
      const data = await res.json();
      for (const [id, isFav] of Object.entries(data)) {
        if (isFav) favSet.add(id);
        else favSet.delete(id);
      }
      // 同步更新卡片 UI
      for (const [id, isFav] of Object.entries(data)) {
        const card = document.querySelector(`.news-card[data-id="${CSS.escape(id)}"]`);
        if (!card) continue;
        const btn = card.querySelector('.fav-btn');
        if (btn) {
          btn.classList.toggle('favorited', isFav);
          btn.innerHTML = isFav ? '⭐ 收藏' : '☆ 收藏';
          btn.title = isFav ? '取消收藏' : '收藏';
        }
      }
    }
  } catch { /* 静默 */ }
}

/** 显示新闻视图 */
function showNewsView() {
  activeView = 'news';
  newsPage = 1;
  // 更新导航高亮
  document.querySelectorAll('.nav-group-btn').forEach(b => b.classList.remove('active'));
  const groupBtn = document.querySelector(`#group-${currentGroup} .nav-group-btn`);
  if (groupBtn) groupBtn.classList.add('active');
  renderCurrentSection(); window.scrollTo({ top: 0, behavior: 'smooth' });
}

/** 渲染当前板块 */
function renderCurrentSection() {
  if (!newsData || !newsData.sections) return;
  const sectionData = newsData.sections[currentSection];
  if (!sectionData) return;

  // 标题
  const titleEl = document.getElementById('sectionTitle');
  titleEl.textContent = `${SUB_ICONS[currentSection] || '📰'} ${SUB_NAMES[currentSection] || currentSection}`;

  const updateEl = document.getElementById('sectionUpdateTime');
  updateEl.textContent = newsData.lastUpdated ? `更新于 ${formatTime(newsData.lastUpdated)}` : '';

  const items = sectionData.items || [];
  if (items.length === 0) {
    document.getElementById('newsList').innerHTML = '<div class="empty-section"><div class="icon">📭</div><p>暂无内容</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  // 分页
  const totalPages = Math.ceil(items.length / PAGE_SIZE) || 1;
  if (newsPage > totalPages) newsPage = totalPages;
  const start = (newsPage - 1) * PAGE_SIZE;
  const paged = items.slice(start, start + PAGE_SIZE);

  // 今日标记
  const today = newsData.today || '';
  let html = '';
  let firstOldFound = false;

  for (const item of paged) {
    const isToday = item.fetchDate === today || (item.publishedAt && item.publishedAt.substring(0, 10) === today);
    if (!isToday && !firstOldFound) {
      html += `<div class="today-marker"><span class="badge">📌 以下为历史消息</span></div>`;
      firstOldFound = true;
    }
    html += createNewsCard(item);
  }
  if (!firstOldFound && paged.length > 0 && items.length > PAGE_SIZE) {
    // 如果这一页全是今天的，在页尾加一个标记
    if (items.length > start + PAGE_SIZE) {
      html += `<div class="today-marker"><span class="badge">⏳ 以下为历史消息</span></div>`;
    }
  }

  document.getElementById('newsList').innerHTML = html;
  document.getElementById('pagination').innerHTML = renderPagination(newsPage, totalPages, 'news');
  updateCounts();
  loadFavStatusForVisibleCards(); // 异步加载可见卡片的收藏状态

  // 如果全局翻译开着，自动翻译新加载的英文文章
  if (isGlobalTranslate) {
    setTimeout(async () => {
      const englishCards = document.querySelectorAll('.news-card[data-lang="en"]');
      for (const card of englishCards) {
        const id = card.dataset.id;
        if (id && !translatedArticles.has(id)) {
          await toggleTranslation(id);
        }
      }
    }, 50);
  }
}

// ============================================================
// 导航切换
// ============================================================

function toggleGroup(group) {
  const drop = document.getElementById(`drop-${group}`);
  if (!drop) return;
  const isOpen = drop.classList.contains('show');
  // 关闭所有
  document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.nav-group-btn').forEach(b => b.classList.remove('open'));
  if (!isOpen) {
    drop.classList.add('show');
    const btn = document.querySelector(`#group-${group} .nav-group-btn`);
    if (btn) btn.classList.add('open');
  }
}

function selectSubsection(group, section) {
  currentGroup = group;
  currentSection = section;
  newsPage = 1;

  // 更新分组按钮高亮
  document.querySelectorAll('.nav-group-btn').forEach(b => b.classList.remove('active'));
  const groupBtn = document.querySelector(`#group-${group} .nav-group-btn`);
  if (groupBtn) groupBtn.classList.add('active');

  // 更新下拉项高亮
  document.querySelectorAll('.dropdown-item').forEach(d => d.classList.remove('active'));
  document.querySelectorAll(`.dropdown-item[data-section="${section}"]`).forEach(d => d.classList.add('active'));

  // 关闭所有下拉
  document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.nav-group-btn').forEach(b => b.classList.remove('open'));

  if (newsData && newsData.sections) {
    activeView = 'news';
    showView('content');
    renderCurrentSection(); window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// 点击外部关闭下拉
document.addEventListener('click', (e) => {
  if (!e.target.closest('.nav-group')) {
    document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('show'));
    document.querySelectorAll('.nav-group-btn').forEach(b => b.classList.remove('open'));
  }
});

// ============================================================
// 创建新闻卡片
// ============================================================

function createNewsCard(item) {
  const typeLabel = { fact: '✅ 事实', speculation: '⚠️ 推测', uncertain: '❓ 不确定' };
  const reliabilityLabel = { high: '可靠', medium: '中等', low: '低' };
  const published = formatTime(item.publishedAt);
  const sourceUrl = item.sourceUrl || '';
  const isExternal = sourceUrl && sourceUrl.startsWith('http');
  const isFav = favSet.has(item.id);
  const isEnglish = item.lang === 'en';
  const section = item._section || currentSection || '';

  // 原文链接（sourceUrl 和 item.id 都需转义防 XSS）
  const safeUrl = sourceUrl ? sourceUrl.replace(/"/g, '&quot;').replace(/'/g, '&#39;') : '';
  const safeId = escapeHtml(item.id);
  const sourceLink = isExternal
    ? `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="source-link" onclick="addHistory('${safeId}')">📎 查看原文 →</a>`
    : `<span class="source-link" style="color:var(--text-tertiary);cursor:default;">📰 ${escapeHtml(item.source || '未知来源')}</span>`;

  const titleLink = isExternal
    ? `<a href="${sourceUrl}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();addHistory('${item.id}')">${escapeHtml(item.title)}</a>`
    : escapeHtml(item.title);

  return `
    <article class="news-card" data-id="${escapeHtml(item.id)}" data-lang="${escapeHtml(item.lang)}" data-section="${escapeHtml(section)}">
      <div class="card-body">
        <div class="news-card-meta">
          <span class="source-badge ${escapeHtml(item.reliability) || 'medium'}">${escapeHtml(item.source) || '未知来源'}</span>
          <span class="type-badge ${escapeHtml(item.type) || 'fact'}">${typeLabel[item.type] || '✅ 事实'}</span>
          ${item.tags && item.tags.length ? `<span class="news-tags">${item.tags.slice(0,3).map(t => `<span class="news-tag">${t}</span>`).join('')}</span>` : ''}
          <span class="news-date">${published}</span>
        </div>
        <h3 class="news-card-title" onclick="trackAndOpen('${safeId}')">${titleLink}</h3>
        <div class="news-card-summary">${escapeHtml(item.summary || '')}</div>
        <div class="news-card-footer">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            ${sourceLink}
            ${isEnglish ? `<button class="translate-btn" onclick="toggleTranslation('${safeId}')" title="点击翻译为中文">🇨🇳 翻译</button>` : ''}
            <button class="fav-btn ${isFav ? 'favorited' : ''}" onclick="toggleFavorite('${safeId}')" title="${isFav ? '取消收藏' : '收藏'}">${isFav ? '⭐' : '☆'} 收藏</button>
          </div>
          <span class="news-tags">
            <span class="news-tag">信源: ${reliabilityLabel[item.reliability] || '中等'}</span>
            <span class="news-tag">${isEnglish ? '英文' : '中文'}</span>
          </span>
        </div>
      </div>
    </article>
  `;
}

// ============================================================
// 分页
// ============================================================

function renderPagination(page, totalPages, type) {
  if (totalPages <= 1) return '';
  const idMap = { news: 'newsPage', favorites: 'favPage', history: 'histPage', search: 'searchPage' };
  const pageVar = idMap[type] || 'newsPage';

  return `
    <button onclick="goToPage(${page-1},'${type}')" ${page <= 1 ? 'disabled' : ''}>‹ 上一页</button>
    <span class="page-info">
      第 <input type="number" value="${page}" min="1" max="${totalPages}"
        onkeydown="if(event.key==='Enter')jumpToPage(this.value,'${type}')"
        onfocus="this.select()"> 页 / 共 ${totalPages} 页
    </span>
    <button onclick="goToPage(${page+1},'${type}')" ${page >= totalPages ? 'disabled' : ''}>下一页 ›</button>
  `;
}

function goToPage(p, type) {
  if (type === 'news') { newsPage = p; renderCurrentSection(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  else if (type === 'favorites') { favPage = p; renderFavorites(); }
  else if (type === 'history') { histPage = p; renderHistory(); }
  else if (type === 'search') { searchPage = p; renderSearch(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function jumpToPage(val, type) {
  let p = parseInt(val);
  if (isNaN(p) || p < 1) p = 1;
  goToPage(p, type);
}

async function loadFavSet() {
  try {
    const res = await fetch('/api/favorites?pageSize=20000');
    if (res.ok) {
      const data = await res.json();
      favoritesCache = data.items || [];
      favSet = new Set(favoritesCache.map(i => i.id));
    }
  } catch { favSet = new Set(); }
}

async function toggleFavorite(itemId) {
  const card = document.querySelector(`.news-card[data-id="${itemId}"]`);
  if (favSet.has(itemId)) {
    // 取消收藏
    try {
      await fetch(`/api/favorites/${itemId}`, { method: 'DELETE' });
      favSet.delete(itemId);
      if (card) {
        card.querySelector('.fav-btn').classList.remove('favorited');
        card.querySelector('.fav-btn').innerHTML = '☆ 收藏';
        card.querySelector('.fav-btn').title = '收藏';
      }
      // 如果在收藏页，刷新
      if (activeView === 'favorites') renderFavorites();
    } catch (err) { console.error('取消收藏失败:', err); }
  } else {
    // 添加收藏
    try {
      // 从 newsData 或缓存中找完整 item
      let item = findItemById(itemId);
      if (!item) return;
      await fetch('/api/favorites', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item })
      });
      favSet.add(itemId);
      if (card) {
        card.querySelector('.fav-btn').classList.add('favorited');
        card.querySelector('.fav-btn').innerHTML = '⭐ 收藏';
        card.querySelector('.fav-btn').title = '取消收藏';
      }
    } catch (err) { console.error('收藏失败:', err); }
  }
}

function findItemById(id) {
  if (!newsData || !newsData.sections) return null;
  for (const sec of Object.values(newsData.sections)) {
    if (!sec.items) continue;
    const found = sec.items.find(i => i.id === id);
    if (found) return found;
  }
  if (favoritesCache) {
    const found = favoritesCache.find(i => i.id === id);
    if (found) return found;
  }
  return null;
}

async function showFavorites() {
  activeView = 'favorites';
  favPage = 1;
  document.querySelectorAll('.nav-group-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-action-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-action-btn')[0]?.classList.add('active');
  // 关闭下拉
  document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.nav-group-btn').forEach(b => b.classList.remove('open'));

  document.getElementById('contentView').style.display = 'none';
  document.getElementById('searchView').style.display = 'none';
  document.getElementById('historyView').style.display = 'none';
  document.getElementById('favoritesView').style.display = 'block';

  await loadFavSet();
  renderFavorites();
}

function renderFavorites() {
  if (!favoritesCache || favoritesCache.length === 0) {
    document.getElementById('favoritesList').innerHTML = '<div class="empty-section"><div class="icon">⭐</div><p>还没有收藏的内容</p></div>';
    document.getElementById('favPagination').innerHTML = '';
    document.getElementById('favCount').textContent = '0 条';
    return;
  }
  const totalPages = Math.ceil(favoritesCache.length / PAGE_SIZE) || 1;
  if (favPage > totalPages) favPage = totalPages;
  const start = (favPage - 1) * PAGE_SIZE;
  const paged = favoritesCache.slice(start, start + PAGE_SIZE);

  document.getElementById('favoritesList').innerHTML = paged.map(item => createNewsCard(item)).join('');
  document.getElementById('favPagination').innerHTML = renderPagination(favPage, totalPages, 'favorites');
  document.getElementById('favCount').textContent = `${favoritesCache.length} 条`;
}

async function manualRefresh() {
  if (isRefreshing) return;
  isRefreshing = true;

  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.classList.add('spinning');
  setStatus('fetching', '正在抓取…');

  try {
    const res = await fetch('/api/refresh', { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    await pollForUpdate();
    await loadNews();
  } catch (err) {
    console.error('刷新失败:', err);
    setStatus('error', '刷新失败');
  } finally {
    isRefreshing = false;
    btn.disabled = false;
    btn.classList.remove('spinning');
  }
}

async function pollForUpdate(maxAttempts = 30, interval = 2000) {
  for (let i = 0; i < maxAttempts; i++) {
    try {
      const res = await fetch('/api/status');
      const status = await res.json();
      if (status.updateStatus === 'success' || status.updateStatus === 'error') return status;
    } catch { /* continue */ }
    await new Promise(r => setTimeout(r, interval));
  }
}

// 工具函数

function formatTime(isoString) {
  if (!isoString) return '';
  try {
    const d = new Date(isoString);
    return d.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch { return isoString; }
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// 翻译（保持不变）
// ============================================================

async function translateWithBackend(text) {
  if (!text) return text;
  const cached = translationCache.get(text);
  if (cached) return cached;
  try {
    const res = await fetch(`/api/translate?text=${encodeURIComponent(text)}&from=en&to=zh`);
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${res.status}`); }
    const data = await res.json();
    if (data.translation) { setTranslationCache(text, data.translation); return data.translation; }
    throw new Error('翻译结果为空');
  } catch (err) { console.error('后端翻译失败:', err.message); throw err; }
}

async function translateBatch(texts) {
  if (!texts || !texts.length) return [];
  const results = texts.map(t => translationCache.has(t) ? translationCache.get(t) : null);
  const uncachedIndices = [], uncachedTexts = [];
  results.forEach((r, i) => { if (r === null) { uncachedIndices.push(i); uncachedTexts.push(texts[i]); } });
  if (!uncachedTexts.length) return results;
  try {
    const res = await fetch('/api/translate/batch', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texts: uncachedTexts, from: 'en', to: 'zh' })
    });
    if (res.ok) {
      const data = await res.json();
      if (data.translations && data.translations.length === uncachedTexts.length) {
        data.translations.forEach((t, i) => { results[uncachedIndices[i]] = t; setTranslationCache(uncachedTexts[i], t); });
      }
    }
  } catch (err) {
    console.warn('批量翻译失败，尝试逐条:', err.message);
    for (const idx of uncachedIndices) { try { results[idx] = await translateWithBackend(texts[idx]); } catch { results[idx] = null; } }
  }
  return results;
}

async function translateText(text) {
  if (!text) return text;
  const cached = translationCache.get(text);
  if (cached) return cached;
  try {
    if ('translation' in self && 'createTranslator' in self.translation) {
      const translator = await self.translation.createTranslator({ sourceLanguage: 'en', targetLanguage: 'zh' });
      const result = await translator.translate(text);
      if (result) { setTranslationCache(text, result); return result; }
    }
  } catch { /* ignore */ }
  try {
    const result = await translateWithBackend(text);
    if (result) return result;
  } catch { /* ignore */ }
  return null;
}

/** 一键翻译所有英文文章 */
async function toggleGlobalTranslate() {
  const btn = document.getElementById('translateAllBtn');
  if (!btn) return;

  // 正在翻译中，点击则暂停
  if (btn.classList.contains('translating')) {
    translateAbortRequested = true;
    btn.innerHTML = '⏹ 停止中…';
    btn.title = '正在停止…';
    return;
  }

  if (isGlobalTranslate) {
    isGlobalTranslate = false;
    btn.classList.remove('active');
    btn.innerHTML = '🌐 全部翻译';
    btn.title = '一键翻译所有英文文章';
    for (const id of [...translatedArticles]) {
      await toggleTranslation(id);
    }
    return;
  }

  // 开始翻译
  translateAbortRequested = false;
  btn.classList.add('translating');
  btn.innerHTML = '⏳ 翻译中(点击暂停)…';
  btn.title = '点击暂停翻译';
  isGlobalTranslate = true;

  const cards = document.querySelectorAll('.news-card[data-lang="en"]');
  let count = 0;
  for (const card of cards) {
    if (translateAbortRequested) break;
    const id = card.dataset.id;
    if (!id || translatedArticles.has(id)) continue;
    await toggleTranslation(id);
    count++;
  }

  if (translateAbortRequested) {
    translateAbortRequested = false;
    isGlobalTranslate = false;
    btn.classList.remove('translating', 'active');
    btn.innerHTML = `⏸ 已暂停(${count}篇)`;
    btn.title = '点击继续翻译';
    setTimeout(() => {
      if (btn && !isGlobalTranslate && !btn.classList.contains('translating')) {
        btn.innerHTML = '🌐 全部翻译';
        btn.title = '一键翻译所有英文文章';
      }
    }, 2000);
  } else {
    btn.classList.remove('translating');
    btn.classList.add('active');
    btn.innerHTML = '🌐 原文';
    btn.title = '点击恢复英文原文';
  }
}

async function toggleTranslation(articleId) {
  const card = document.querySelector(`.news-card[data-id="${articleId}"]`);
  if (!card) return;
  const isTranslated = translatedArticles.has(articleId);
  const btn = card.querySelector('.translate-btn');
  if (!btn) return;
  if (!isTranslated && translationInProgress.has(articleId)) return;

  if (isTranslated) {
    const titleEl = card.querySelector('.news-card-title');
    const summaryEl = card.querySelector('.news-card-summary');
    if (card.dataset.originalTitle && titleEl) {
      if (card.dataset.originalTitleHtml) titleEl.innerHTML = card.dataset.originalTitleHtml;
      else titleEl.textContent = card.dataset.originalTitle;
    }
    if (summaryEl && card.dataset.originalSummary !== undefined) summaryEl.textContent = card.dataset.originalSummary;
    translatedArticles.delete(articleId);
    btn.classList.remove('translated'); btn.innerHTML = '🇨🇳 翻译'; btn.title = '点击翻译为中文';
  } else {
    translationInProgress.add(articleId);
    btn.classList.add('loading'); btn.innerHTML = '⏳ 翻译中…';
    const titleEl = card.querySelector('.news-card-title');
    const summaryEl = card.querySelector('.news-card-summary');
    const title = titleEl ? titleEl.textContent : '';
    const summary = summaryEl ? summaryEl.textContent : '';
    if (!card.dataset.originalTitle) { card.dataset.originalTitle = title; if (titleEl) card.dataset.originalTitleHtml = titleEl.innerHTML; }
    if (!card.dataset.originalSummary && summaryEl) card.dataset.originalSummary = summary;

    const texts = [title || '']; if (summary) texts.push(summary);
    const translations = await translateBatch(texts);
    const tTitle = translations[0], tSummary = translations.length > 1 ? translations[1] : null;
    if (tTitle && titleEl) titleEl.textContent = tTitle;
    if (tSummary && summaryEl) summaryEl.textContent = tSummary;
    translationInProgress.delete(articleId);

    if (tTitle || tSummary) {
      translatedArticles.add(articleId);
      btn.classList.remove('loading'); btn.classList.add('translated');
      btn.innerHTML = '🇨🇳 中文 ✓'; btn.title = '点击显示原文';
    } else {
      btn.classList.remove('loading');
      btn.innerHTML = '🇨🇳 翻译失败';
      btn.title = '翻译服务不可用';
      setTimeout(() => { if (!translatedArticles.has(articleId)) { btn.innerHTML = '🇨🇳 翻译'; btn.title = '点击翻译为中文'; } }, 3000);
    }
  }
}

// ============================================================
// 自动检测更新
// ============================================================
function startAutoRefresh() {
  autoRefreshTimer = setInterval(async () => {
    try {
      const res = await fetch('/api/status');
      const status = await res.json();
      if (status.updateStatus === 'success' && status.lastUpdated !== (newsData?.lastUpdated)) {
        console.log('检测到新数据，自动刷新');
        await loadNews();
      }
    } catch { /* 静默失败 */ }
  }, 5 * 60 * 1000);
}

// ============================================================
// 夜间模式
// ============================================================

function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const isLight = html.getAttribute('data-theme') === 'light';
  if (isLight) {
    html.removeAttribute('data-theme');
    btn.textContent = '☀️';
    btn.title = '切换日间模式';
    localStorage.setItem('theme', 'dark');
  } else {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '🌙';
    btn.title = '切换夜间模式';
    localStorage.setItem('theme', 'light');
  }
}

function applyTheme() {
  const saved = localStorage.getItem('theme');
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  const html = document.documentElement;
  const btn = document.getElementById('themeToggle');
  // 默认暗色，除非用户之前保存了亮色模式
  if (saved === 'light' || (!saved && prefersLight)) {
    html.setAttribute('data-theme', 'light');
    if (btn) { btn.textContent = '🌙'; btn.title = '切换夜间模式'; }
  } else {
    html.removeAttribute('data-theme');
    if (btn) { btn.textContent = '☀️'; btn.title = '切换日间模式'; }
  }
}

// ============================================================
// 初始化
// ============================================================

  applyTheme();
  loadNews();
  startAutoRefresh();
});
